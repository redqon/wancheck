<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WAN Check</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="WAN Check" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
    <meta name="description" content="Проверка доступности WAN-сервисов" />

    <link rel="stylesheet" href="assets/css/app.css" />
  </head>

  <body>
    <div class="wrap">
      <div class="header">
        <span class="logo">WAN Check</span>
        <div>
          <span class="ts" id="ts">—</span>
        </div>
      </div>

      <div class="status-block">
        <div class="status-row">
          <div class="dot checking" id="dot"></div>
          <div class="status-label" id="statusLabel">Проверка</div>
        </div>
        <div class="status-sub" id="statusSub">инициализация…</div>
      </div>

      <div class="meta">
        <div class="meta-cell">
          <div class="meta-lbl">IP адрес</div>
          <div class="meta-val empty skeleton" id="metaIp">000.000.000.000</div>
        </div>
        <div class="meta-cell">
          <div class="meta-lbl">Avg. ping</div>
          <div class="meta-val empty skeleton" id="metaPing">000 ms</div>
        </div>
        <div class="meta-cell">
          <div class="meta-lbl">Доступно</div>
          <div class="meta-val empty skeleton" id="metaAvail">0 / 0</div>
        </div>
        <div class="meta-cell">
          <div class="meta-lbl">Город</div>
          <div class="meta-val empty skeleton" id="metaCity">Город, RU</div>
        </div>
        <div class="meta-cell">
          <div class="meta-lbl">Провайдер</div>
          <div class="meta-val empty skeleton" id="metaIsp">Провайдер</div>
        </div>
        <div class="meta-cell">
          <div class="meta-lbl">Устройство</div>
          <div class="meta-val" id="metaDevice">—</div>
        </div>
      </div>

      <div class="section-lbl">Пинг</div>
      <div class="chart-wrap">
        <canvas id="pingChart"></canvas>
        <div class="chart-legend">
          <span class="chart-legend-item"
            ><span class="chart-legend-dot"></span>Avg. ping</span
          >
          <span class="chart-legend-item"
            ><span class="chart-legend-dot offline"></span>Провал</span
          >
        </div>
      </div>

      <div class="section-header">
        <div class="section-lbl">Сервисы</div>
        <button
          class="settings-toggle"
          id="settingsToggle"
          title="Настроить список сервисов"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="8" cy="8" r="2.5" />
            <path
              d="M13.3 10a1.2 1.2 0 0 0 .2 1.3l.1.1a1.4 1.4 0 1 1-2 2l-.1-.1a1.2 1.2 0 0 0-2 .9v.2a1.4 1.4 0 1 1-2.8 0v-.1a1.2 1.2 0 0 0-.8-.8 1.2 1.2 0 0 0-1.3.2l-.1.1a1.4 1.4 0 1 1-2-2l.1-.1A1.2 1.2 0 0 0 2.7 10h-.2a1.4 1.4 0 1 1 0-2.8h.1a1.2 1.2 0 0 0 .8-.8 1.2 1.2 0 0 0-.2-1.3l-.1-.1a1.4 1.4 0 1 1 2-2l.1.1A1.2 1.2 0 0 0 6 2.7V2.5a1.4 1.4 0 1 1 2.8 0v.1a1.2 1.2 0 0 0 2.1.9l.1-.1a1.4 1.4 0 1 1 2 2l-.1.1a1.2 1.2 0 0 0 .4 2.1h.2a1.4 1.4 0 1 1 0 2.8h-.1z"
            />
          </svg>
        </button>
      </div>

      <div class="settings-panel" id="settingsPanel" hidden>
        <div class="settings-hint">Выберите сервисы для проверки</div>
        <div id="settingsCheckboxes"></div>
      </div>

      <div id="servicesList"></div>

      <button
        class="install-btn"
        id="installBtn"
        title="Установить приложение"
        hidden
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M8 2v8m0 0l-3-3m3 3l3-3" />
          <path d="M2 12v1.5a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5V12" />
        </svg>
        Установить
      </button>

      <button class="share-btn" id="shareBtn" title="Поделиться результатом">
        <svg
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="3" r="2" />
          <circle cx="12" cy="13" r="2" />
          <circle cx="4" cy="8" r="2" />
          <line x1="5.7" y1="9.1" x2="10.3" y2="11.9" />
          <line x1="10.3" y1="4.1" x2="5.7" y2="6.9" />
        </svg>
        Поделиться
      </button>

      <div class="shared-banner" id="sharedBanner" style="display: none">
        <span>Вы просматриваете сохранённый снимок проверки</span>
        <a href="./" class="shared-banner-link">Проверить сейчас →</a>
      </div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
