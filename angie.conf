# ──────────────────────────────────────────────────────────
#  Angie / nginx config for WAN Check (static PWA)
#  Положить в /etc/angie/sites-enabled/wancheck.conf
#  и заменить server_name / root на свои значения
# ──────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name wancheck.example.com;

    # ── Редирект на HTTPS ──
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wancheck.example.com;

    root /var/www/updodo;
    index index.html;

    # ── SSL (подставить свои пути / Let's Encrypt) ──
    ssl_certificate     /etc/letsencrypt/live/wancheck.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wancheck.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ──
    add_header X-Content-Type-Options  "nosniff"                              always;
    add_header X-Frame-Options         "SAMEORIGIN"                           always;
    add_header X-XSS-Protection        "1; mode=block"                        always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Скрыть версию сервера ──
    server_tokens off;

    # ── Запрет доступа к скрытым файлам ──
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── data/ — разрешить только targets.json ──
    location /data/ {
        location = /data/targets.json {
            add_header Cache-Control "public, max-age=3600";
        }
        deny all;
        return 403;
    }

    # ── Статика: CSS, JS, иконки — долгий кеш ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Service Worker — без кеша ──
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ── Manifest ──
    location = /manifest.json {
        add_header Cache-Control "public, max-age=86400";
        types { application/manifest+json json; }
    }

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # ── SPA fallback — все пути → index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
